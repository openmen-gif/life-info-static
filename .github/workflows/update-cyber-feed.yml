name: Update Cyber Threat Feed

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build cyber incident feed
        run: python scripts/build_cyber_feed.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cyber_incidents.json
          git diff --cached --quiet || git commit -m "chore: update cyber threat feed [skip ci]"
          git push
